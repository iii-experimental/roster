workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: roster
      service_namespace: experimental
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/state_store

  - name: iii-queue
    config:
      queue_configs:
        default:
          max_retries: 3
          concurrency: 4
          type: standard
        agent-runs:
          max_retries: 3
          concurrency: 2
          type: standard
      adapter:
        name: builtin
        config:
          store_method: file_based
          file_path: ./data/queue_store

  # WebSocket stream on :3112 is what iii-console's /ws/streams proxy talks to.
  # Without this, the console banner shows "Connection blocked by CORS" even
  # though the HTTP API at :3111 is reachable — the WS upgrade just 404s.
  - name: iii-stream
    config:
      port: 3112
      host: 127.0.0.1
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/stream_store

  - name: iii-pubsub
    config:
      adapter:
        name: local

  # Required for cron triggers (runtimes::gc, etc). Without it the engine logs
  # "cron trigger failed" on every worker that registers one.
  - name: iii-cron
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/cron_store

  # HTTP API on :3111 so iii-console (which runs at :3113) can reach the
  # engine via its default REST port. CORS allows the console origin and
  # common dev origins so the browser doesn't block the console SPA.
  - name: iii-http
    config:
      port: 3111
      host: 127.0.0.1
      cors:
        allowed_origins:
          - http://localhost:3113
          - http://127.0.0.1:3113
          - http://localhost:5173
          - http://127.0.0.1:5173
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
          - PATCH

  - name: roster-ui
    worker_path: ./workers/roster-ui

  - name: roster-orchestrator
    worker_path: ./workers/roster-orchestrator

  - name: issues
    worker_path: ./workers/issues

  - name: thread
    worker_path: ./workers/thread

  - name: runtimes
    worker_path: ./workers/runtimes

  - name: agent-daemon
    worker_path: ./workers/agent-daemon

  - name: memory
    worker_path: ./workers/memory

  - name: shell
    worker_path: ./workers/shell

  - name: sandbox
    worker_path: ./workers/sandbox

  - name: agent
    worker_path: ./workers/agent

  - name: provider-openrouter
    worker_path: ./workers/provider-openrouter

  - name: provider-anthropic
    worker_path: ./workers/provider-anthropic

  - name: provider-openai
    worker_path: ./workers/provider-openai

  - name: provider-cli
    worker_path: ./workers/provider-cli

  # Registry worker. Resolves via `iii worker add llm-router` once it ships in
  # iii-hq/workers. For local development before then, add a relative
  # `worker_path:` line (e.g. `worker_path: ./workers/llm-router`) pointing to
  # your local checkout. Do NOT commit an absolute path — it won't work on
  # other machines or in CI. See docs/providers.md.
  - name: llm-router

  # Phase-2 narrow workers (graduate to iii-hq/workers once stable).
  - name: meter
    worker_path: ./workers/meter

  - name: guardrails
    worker_path: ./workers/guardrails

  - name: llm-budget
    worker_path: ./workers/llm-budget

  - name: auth
    worker_path: ./workers/auth

  - name: repocache
    worker_path: ./workers/repocache

  - name: mention
    worker_path: ./workers/mention

  - name: autopilot
    worker_path: ./workers/autopilot
